<!DOCTYPE html>
<html>
<head>
    <title>Test Select2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Test Select2</h2>
        <div class="mb-3">
            <label class="form-label">Test Dropdown with form-select class:</label>
            <select class="form-select" id="test1">
                <option value="">-- Pilih --</option>
                <option value="1">Option 1</option>
                <option value="2">Option 2</option>
                <option value="3">Option 3</option>
                <option value="4">Option 4</option>
                <option value="5">Option 5</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Test Dropdown without class:</label>
            <select id="test2">
                <option value="">-- Pilih --</option>
                <option value="1">Option 1</option>
                <option value="2">Option 2</option>
                <option value="3">Option 3</option>
            </select>
        </div>

        <div id="debug-info" class="alert alert-info">
            <h5>Debug Info:</h5>
            <p id="jquery-loaded">jQuery: <span class="text-danger">Not loaded</span></p>
            <p id="select2-loaded">Select2: <span class="text-danger">Not loaded</span></p>
            <p id="select2-initialized">Select2 Initialized: <span class="text-danger">No</span></p>
        </div>
    </div>

    <!-- Load scripts in correct order -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <script>
        console.log('=== SELECT2 DEBUG TEST ===');
        
        // Check jQuery
        if (typeof jQuery !== 'undefined') {
            document.getElementById('jquery-loaded').innerHTML = 'jQuery: <span class="text-success">✓ Loaded (v' + jQuery.fn.jquery + ')</span>';
            console.log('✓ jQuery loaded:', jQuery.fn.jquery);
        } else {
            console.error('✗ jQuery NOT loaded');
        }
        
        // Check Select2
        if (typeof jQuery !== 'undefined' && typeof jQuery.fn.select2 !== 'undefined') {
            document.getElementById('select2-loaded').innerHTML = 'Select2: <span class="text-success">✓ Loaded</span>';
            console.log('✓ Select2 loaded');
        } else {
            console.error('✗ Select2 NOT loaded');
        }
        
        // Initialize Select2
        $(document).ready(function() {
            console.log('Document ready fired');
            
            try {
                $('.form-select').select2({
                    theme: 'default',
                    width: '100%',
                    minimumResultsForSearch: 5,
                    placeholder: 'Pilih...'
                });
                
                $('#test2').select2({
                    theme: 'default',
                    width: '100%'
                });
                
                document.getElementById('select2-initialized').innerHTML = 'Select2 Initialized: <span class="text-success">✓ YES</span>';
                console.log('✓ Select2 initialized successfully');
                console.log('Found elements with .form-select:', $('.form-select').length);
            } catch(e) {
                console.error('✗ Select2 initialization failed:', e);
                document.getElementById('select2-initialized').innerHTML = 'Select2 Initialized: <span class="text-danger">✗ ERROR: ' + e.message + '</span>';
            }
        });
    </script>
</body>
</html>
